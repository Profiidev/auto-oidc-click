<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --ring: 222.2 84% 4.9%;
        --radius: 0.5rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;
          --muted: 217.2 32.6% 17.5%;
          --muted-foreground: 215 20.2% 65.1%;
          --popover: 222.2 84% 4.9%;
          --popover-foreground: 210 40% 98%;
          --border: 217.2 32.6% 17.5%;
          --input: 217.2 32.6% 17.5%;
          --primary: 210 40% 98%;
          --primary-foreground: 222.2 47.4% 11.2%;
          --secondary: 217.2 32.6% 17.5%;
          --secondary-foreground: 210 40% 98%;
          --accent: 217.2 32.6% 17.5%;
          --accent-foreground: 210 40% 98%;
          --destructive: 0 62.8% 30.6%;
          --destructive-foreground: 210 40% 98%;
          --ring: 212.7 26.8% 83.9%;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        padding: 12px;
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-size: 13px;
        line-height: 1.5;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .header-container {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .header {
        font-weight: 600;
        font-size: 14px;
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .description {
        font-size: 12px;
        color: hsl(var(--muted-foreground));
      }

      .separator {
        height: 1px;
        background-color: hsl(var(--border));
        margin: 2px 0;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .switch-label {
        font-weight: 500;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }

      .switch {
        position: relative;
        display: inline-flex;
        height: 18px;
        width: 32px;
        flex-shrink: 0;
        cursor: pointer;
        align-items: center;
        border-radius: 9999px;
        border: 2px solid transparent;
        transition: background-color 0.2s;
        background-color: hsl(var(--input));
        padding: 0;
        outline: none;
      }

      .switch[aria-checked="true"] {
        background-color: hsl(var(--primary));
      }

      .switch-thumb {
        pointer-events: none;
        display: block;
        height: 14px;
        width: 14px;
        border-radius: 9999px;
        background-color: hsl(var(--background));
        transition: transform 0.2s;
        transform: translateX(0);
      }

      .switch[aria-checked="true"] .switch-thumb {
        transform: translateX(14px);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: calc(var(--radius) - 2px);
        font-size: 12px;
        font-weight: 500;
        height: 26px;
        padding: 0 10px;
        cursor: pointer;
        transition: background-color 0.2s;
        border: 1px solid hsl(var(--border));
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      .btn-primary {
        background-color: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
        border: none;
      }

      .btn-ghost {
        border: none;
        background: transparent;
        padding: 0 6px;
      }

      .btn-destructive:hover {
        color: hsl(var(--destructive));
      }

      .rules-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 200px;
        overflow-y: auto;
        padding-right: 2px;
      }

      .rules-list::-webkit-scrollbar {
        width: 3px;
      }
      .rules-list::-webkit-scrollbar-thumb {
        background: hsl(var(--border));
        border-radius: 10px;
      }

      .rule-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        background: hsl(var(--background));
      }

      .rule-info {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex: 1;
      }

      .rule-url {
        font-weight: 600;
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .rule-text {
        font-size: 10px;
        color: hsl(var(--muted-foreground));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .rule-actions {
        display: flex;
        gap: 2px;
      }

      .icon-btn {
        padding: 2px;
        height: 22px;
        width: 22px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-container">
        <div class="header">Auto OIDC Click</div>
      </div>

      <div class="row">
        <label class="switch-label" for="enabled">Auto-Click</label>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          class="switch"
          id="switch-btn"
        >
          <span class="switch-thumb"></span>
        </button>
        <input type="checkbox" id="enabled" class="sr-only" checked />
      </div>

      <div class="separator"></div>

      <div class="section">
        <div class="row">
          <div class="header">Rules</div>
          <button id="add-rule-btn" class="btn btn-primary">+ Add</button>
        </div>
        <div
          id="error-message"
          style="color: hsl(var(--destructive)); font-size: 11px; display: none"
        ></div>
        <div id="rules-list" class="rules-list">
          <!-- Rules will be injected here -->
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
