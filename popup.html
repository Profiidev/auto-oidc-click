<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 222.2 84% 4.9%;
        --radius: 1rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;
          --primary: 210 40% 98%;
          --primary-foreground: 222.2 47.4% 11.2%;
          --border: 217.2 32.6% 17.5%;
          --input: 217.2 32.6% 17.5%;
          --ring: 212.7 26.8% 83.9%;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 240px;
        padding: 16px;
        margin: 0;
        border-radius: var(--radius);
        overflow: hidden;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-size: 14px;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .header-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .header {
        font-weight: 600;
        font-size: 16px;
        line-height: 1;
        letter-spacing: -0.025em;
      }

      .description {
        font-size: 13px;
        color: hsl(var(--foreground) / 0.6);
        line-height: 1.25;
      }

      .switch-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid hsl(var(--border));
        padding: 12px;
        border-radius: var(--radius);
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }

      .switch-label {
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
        user-select: none;
        line-height: 1;
      }

      /* Switch styling */
      .switch {
        position: relative;
        display: inline-flex;
        height: 24px;
        width: 44px;
        flex-shrink: 0;
        cursor: pointer;
        align-items: center;
        border-radius: 9999px;
        border: 2px solid transparent;
        transition:
          background-color 0.2s,
          transform 0.2s;
        background-color: hsl(var(--input));
        padding: 0;
      }

      .switch:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 2px hsl(var(--background)),
          0 0 0 4px hsl(var(--ring));
      }

      .switch[aria-checked="true"] {
        background-color: hsl(var(--primary));
      }

      .switch-thumb {
        pointer-events: none;
        display: block;
        height: 20px;
        width: 20px;
        border-radius: 9999px;
        background-color: hsl(var(--background));
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        transition: transform 0.2s;
        transform: translateX(0);
      }

      .switch[aria-checked="true"] .switch-thumb {
        transform: translateX(20px);
      }

      /* Hide the actual checkbox */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-container">
        <div class="header">Settings</div>
        <div class="description">Manage your extension preferences.</div>
      </div>

      <div class="switch-container">
        <label class="switch-label" for="enabled">Auto-Click</label>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          class="switch"
          id="switch-btn"
        >
          <span class="switch-thumb"></span>
        </button>
        <input type="checkbox" id="enabled" class="sr-only" checked />
      </div>
    </div>

    <script>
      // Link button to checkbox for backwards compatibility with popup.js
      const switchBtn = document.getElementById("switch-btn");
      const checkbox = document.getElementById("enabled");

      // Sync UI with initial state (wait a tick for popup.js to set it)
      setTimeout(() => {
        switchBtn.setAttribute("aria-checked", checkbox.checked);
      }, 50);

      switchBtn.addEventListener("click", () => {
        const isChecked = switchBtn.getAttribute("aria-checked") === "true";
        switchBtn.setAttribute("aria-checked", !isChecked);
        checkbox.checked = !isChecked;
        // Trigger change event for popup.js
        checkbox.dispatchEvent(new Event("change"));
      });

      checkbox.addEventListener("change", () => {
        switchBtn.setAttribute("aria-checked", checkbox.checked);
      });
    </script>
    <script src="popup.js"></script>
  </body>
</html>
